<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">📘</span>
      <span class="brand-name">English Learning</span>
    </div>

    <nav class="sidebar-nav">
      <a
        [routerLink]="['/english-learning/english-studies']"
        routerLinkActive="nav-item--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
      >
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </span>
        <span class="nav-label">{{ 'sidebar.englishStudies' | translate }}</span>
      </a>

      <a
        [routerLink]="['/english-learning/user-management']"
        routerLinkActive="nav-item--active"
        class="nav-item"
      >
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        <span class="nav-label">{{ 'sidebar.userManagement' | translate }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button type="button" class="nav-item nav-item--logout" (click)="logout()">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </span>
        <span class="nav-label">{{ 'sidebar.logout' | translate }}</span>
      </button>
    </div>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
