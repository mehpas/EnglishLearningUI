<div class="modal-overlay" *ngIf="isOpen" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ isEditMode ? ('modal.editTitle' | translate) : ('modal.createTitle' | translate) }}</h2>
      <button class="close-btn" (click)="onClose()" [disabled]="loading">✕</button>
    </div>

    <div class="modal-body">
      <form (ngSubmit)="onSubmit()">
        <div class="server-error" *ngIf="serverError">
          {{ serverError }}
        </div>
        <!-- İsim Alanı -->
        <div class="form-group">
          <label for="isim">{{ 'modal.nameLabel' | translate }}</label>
          <input
            id="isim"
            type="text"
            [(ngModel)]="formData.isim"
            name="isim"
            [placeholder]="'modal.namePlaceholder' | translate"
            [disabled]="loading"
            class="form-input"
            [class.error]="errors['isim']"
          >
          <span class="error-message" *ngIf="errors['isim']">{{ errors['isim'] }}</span>
        </div>

        <!-- Email Alanı -->
        <div class="form-group">
          <label for="email">{{ 'modal.emailLabel' | translate }}</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="formData.email"
            name="email"
            [placeholder]="'modal.emailPlaceholder' | translate"
            [disabled]="loading"
            class="form-input"
            [class.error]="errors['email']"
          >
          <span class="error-message" *ngIf="errors['email']">{{ errors['email'] }}</span>
        </div>
      </form>
    </div>

    <div class="modal-footer">
      <button class="btn btn-cancel" (click)="onClose()" [disabled]="loading">
        {{ 'modal.cancel' | translate }}
      </button>
      <button class="btn btn-submit" (click)="onSubmit()" [disabled]="loading">
        {{ loading ? ('modal.saving' | translate) : ('modal.save' | translate) }}
      </button>
    </div>
  </div>
</div>
